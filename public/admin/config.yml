backend:

  name: github

  repo: jeffw5/blog            # owner/repo

  branch: main

  base_url: https://YOUR-WORKER.workers.dev   # the Cloudflare Worker from Step 5

# Where uploaded images are committed, and the URL they resolve to on the live site.

media_folder: "public/images"

public_folder: "/blog/images"

# Nice preview links in the editor

site_url: https://jeffw5.github.io/blog

display_url: https://jeffw5.github.io/blog

collections:

  - name: blog

    label: Blog Posts

    folder: src/content/blog     # must match the Astro content collection folder

    create: true

    slug: "{{slug}}"

    fields:

      - { name: title, label: Title, widget: string }

      - { name: description, label: Description, widget: text }

      - { name: pubDate, label: Publish Date, widget: datetime }

      - { name: updatedDate, label: Updated Date, widget: datetime, required: false }

      - { name: heroImage, label: Hero Image, widget: image, required: false }

      - { name: body, label: Body, widget: markdown }

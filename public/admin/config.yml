backend:
  name: github
  repo: jeffw5/blog            # owner/repo
  branch: main
  base_url: https://sveltia-cms-auth.jeffrey-wallk.workers.dev   # the Cloudflare Worker from Step 5

# Where uploaded images are committed, and the URL they resolve to on the live site.
media_folder: "public/images"
public_folder: "/images"

# Nice preview links in the editor
site_url: https://blog.enablingvalue.com
display_url: https://blog.enablingvalue.com

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog     # must match the Astro content collection folder
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text }
      - { name: pubDate, label: Publish Date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ss" }
      - { name: updatedDate, label: Updated Date, widget: datetime, required: false, format: "YYYY-MM-DDTHH:mm:ss" }
      - { name: heroImage, label: Hero Image, widget: image, required: false }
      - { name: tags, label: Tags, widget: relation, collection: tags, value_field: title, display_fields: [title], search_fields: [title], multiple: true, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: tags
    label: Tags
    folder: src/data/tags
    create: true
    icon: sell
    fields:
      - { name: title, label: Tag Name, widget: string }